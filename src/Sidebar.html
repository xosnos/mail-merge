<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 15px;
        color: #333;
      }
      h2 {
        font-size: 16px;
        margin-bottom: 20px;
        color: #0F9D58;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: bold;
        font-size: 12px;
        margin-bottom: 5px;
      }
      input[type="text"], select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      .btn {
        width: 100%;
        padding: 10px;
        background-color: #0F9D58;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn:hover {
        background-color: #0d8a4d;
      }
      .btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .status-box {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
        font-size: 12px;
        background-color: #f1f3f4;
        display: none;
      }
      .section-divider {
        padding-top: 10px;
        border-top: 1px solid #ddd;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
      }
      .toggle-row label {
        font-weight: normal;
        font-size: 13px;
        margin-bottom: 0;
        flex: 1;
      }
      .toggle-switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #ccc;
        border-radius: 22px;
        transition: 0.3s;
      }
      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.3s;
      }
      .toggle-switch input:checked + .toggle-slider {
        background-color: #0F9D58;
      }
      .toggle-switch input:checked + .toggle-slider:before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h2>Mail Merge</h2>
    
    <div class="form-group">
      <label for="draftSelect" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Select Gmail Draft</span>
        <a href="#" id="refreshDraftsBtn" style="color: #0F9D58; text-decoration: none; font-weight: normal; font-size: 11px;">🔄 Refresh</a>
      </label>
      <select id="draftSelect">
        <option value="">Loading drafts...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="senderName">Sender Name</label>
      <input type="text" id="senderName" placeholder="e.g. HR Department">
    </div>

    <div class="form-group">
      <label for="senderAlias">Sender Email</label>
      <select id="senderAlias">
        <option value="">Loading aliases...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="emailColumn">Recipient Email Column</label>
      <select id="emailColumn">
        <option value="">Loading columns...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="replyTo">Reply-To Address (Optional)</label>
      <input type="text" id="replyTo" placeholder="e.g. support@company.com">
    </div>
    
    <div class="form-group section-divider">
      <label for="webAppUrl">Analytics: Web App Tracking URL (Optional)</label>
      <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <button id="btnTest" class="btn" style="background-color: #f1f3f4; color: #333; margin-top: 20px;" disabled>Send Test Email</button>
    <button id="btnSend" class="btn" disabled>Send Emails</button>
    
    <div class="section-divider" style="margin-top: 15px;">
      <button id="btnRefresh" class="btn" style="background-color: #4285F4;">Refresh Analytics</button>
      <p style="font-size: 11px; color: #666; margin-top: 10px;">Note: Background analytics scan runs automatically every 15 minutes.</p>
    </div>
    
    <div id="statusBox" class="status-box"></div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        loadData();
        
        // Add event listeners
        document.getElementById('draftSelect').addEventListener('change', handleDraftSelection);
        document.getElementById('emailColumn').addEventListener('change', function(e) {
             // Save email column preference
        });
        document.getElementById('refreshDraftsBtn').addEventListener('click', function(e) {
          e.preventDefault();
          loadData();
        });
        
        document.getElementById('btnTest').addEventListener('click', function() {
           triggerSend(true);
        });
        document.getElementById('btnSend').addEventListener('click', function() {
           triggerSend(false);
        });
        document.getElementById('btnRefresh').addEventListener('click', function() {
           triggerRefreshAnalytics();
        });
      });
      
      function triggerRefreshAnalytics() {
          showStatus('Scanning for bounces and replies...');
          var btnRefresh = document.getElementById('btnRefresh');
          btnRefresh.disabled = true;
          google.script.run
            .withSuccessHandler(function(response) {
               if (response.success) { showStatus(response.message); } 
               else { showStatus('Error: ' + response.message, true); }
               btnRefresh.disabled = false;
               setTimeout(function() { document.getElementById('statusBox').style.display = 'none'; }, 5000);
            })
            .withFailureHandler(function(error) {
               showStatus('Execution Error: ' + error.message, true);
               btnRefresh.disabled = false;
            })
            .runAnalyticsScanner();
      }
      
      function getUiConfig() {
         return {
           draftId: document.getElementById('draftSelect').value,
           senderName: document.getElementById('senderName').value,
           senderAlias: document.getElementById('senderAlias').value,
           replyTo: document.getElementById('replyTo').value,
           emailColumn: document.getElementById('emailColumn').value,
           webAppUrl: document.getElementById('webAppUrl').value
         };
      }
      
      function triggerSend(isTest) {
         var config = getUiConfig();
         
         if (!config.draftId || !config.emailColumn) {
             showStatus('Please ensure Draft and Email Column are selected.', true);
             return;
         }
         
         var btnTest = document.getElementById('btnTest');
         var btnSend = document.getElementById('btnSend');
         btnTest.disabled = true;
         btnSend.disabled = true;
         
         var actionMsg = isTest ? 'Sending test email to yourself...' : 'Sending batch emails...';
         showStatus(actionMsg);
         
         var backendFunc = isTest ? 'sendTestEmail' : 'sendBatchEmails';
         
         google.script.run
           .withSuccessHandler(function(response) {
               if (response.success) {
                  showStatus(response.message);
               } else {
                  showStatus('Error: ' + response.message, true);
               }
               btnTest.disabled = false;
               btnSend.disabled = false;
               if (response.success && !isTest) {
                   setTimeout(function() { document.getElementById('statusBox').style.display = 'none'; }, 5000);
               }
           })
           .withFailureHandler(function(error) {
               showStatus('Execution Error: ' + error.message, true);
               btnTest.disabled = false;
               btnSend.disabled = false;
           })
           [backendFunc](config);
      }

      function loadData() {
        showStatus('Loading accounts and drafts...');
        var btnSend = document.getElementById('btnSend');
        btnSend.disabled = true;
        
        var draftSelect = document.getElementById('draftSelect');
        var currentDraftId = draftSelect ? draftSelect.value : null;
        
        google.script.run
          .withSuccessHandler(function(data) {
            initializeUI(data, currentDraftId);
          })
          .withFailureHandler(function(error) {
            showStatus('Error Loading: ' + error.message, true);
          })
          .getSidebarData();
      }
      
      function initializeUI(data, currentDraftId) {
        showStatus('Data loaded successfully!');
        
        // Populate Drafts
        var draftSelect = document.getElementById('draftSelect');
        draftSelect.innerHTML = '<option value="">-- Choose a Draft --</option>';
        data.drafts.forEach(function(draft) {
          var opt = document.createElement('option');
          opt.value = draft.id;
          opt.text = draft.subject;
          draftSelect.add(opt);
        });
        
        // Populate Aliases
        var aliasSelect = document.getElementById('senderAlias');
        aliasSelect.innerHTML = '';
        data.aliases.forEach(function(alias) {
          var opt = document.createElement('option');
          opt.value = alias;
          opt.text = alias;
          aliasSelect.add(opt);
        });
        
        // Populate Email Column
        var emailColSelect = document.getElementById('emailColumn');
        emailColSelect.innerHTML = '';
        var foundEmailCol = false;
        
        data.headers.forEach(function(header) {
          if (!header) return;
          var opt = document.createElement('option');
          opt.value = header;
          opt.text = header;
          emailColSelect.add(opt);
          
          if (!foundEmailCol && header.toLowerCase().includes('email')) {
             opt.selected = true;
             foundEmailCol = true;
          }
        });
        
        // Restore saved settings or preserve current selection during refresh
        var draftToSelect = currentDraftId;
        if (!draftToSelect && data.savedProperties && data.savedProperties['YAMM_CLONE_DRAFT_ID']) {
           draftToSelect = data.savedProperties['YAMM_CLONE_DRAFT_ID'];
        }
        
        if (draftToSelect) {
           var exists = Array.from(draftSelect.options).some(function(opt) { return opt.value === draftToSelect; });
           if (exists) {
               draftSelect.value = draftToSelect;
               handleDraftSelection({target: draftSelect});
           }
        }
        
        if (data.savedProperties && data.savedProperties['YAMM_CLONE_EMAIL_COLUMN']) {
           emailColSelect.value = data.savedProperties['YAMM_CLONE_EMAIL_COLUMN'];
        }
        if (data.savedProperties && data.savedProperties['YAMM_CLONE_WEB_APP_URL']) {
           document.getElementById('webAppUrl').value = data.savedProperties['YAMM_CLONE_WEB_APP_URL'];
        }
        
        setTimeout(function() {
          document.getElementById('statusBox').style.display = 'none';
        }, 3000);
      }
      
      function handleDraftSelection(e) {
        var draftId = e.target.value;
        var btnSend = document.getElementById('btnSend');
        
        if (!draftId) {
          btnSend.disabled = true;
          showStatus('');
          return;
        }
        
        showStatus('Validating template variables...');
        btnSend.disabled = true;
        
        google.script.run
          .withSuccessHandler(function(result) {
            var btnTest = document.getElementById('btnTest');
            var btnSend = document.getElementById('btnSend');
            if (result.isValid) {
               showStatus('Template matches all columns! Ready to send.');
               btnSend.disabled = false;
               btnTest.disabled = false;
               setTimeout(function() { document.getElementById('statusBox').style.display = 'none'; }, 2000);
            } else {
               showStatus('Missing Columns in Sheet: ' + result.missingColumns.join(', '), true);
               btnSend.disabled = true;
               btnTest.disabled = true;
            }
          })
          .withFailureHandler(function(error) {
            showStatus('Validation Error: ' + error.message, true);
          })
          .validateTemplate(draftId);
      }
      
      function showStatus(msg, isError) {
        isError = isError || false;
        var box = document.getElementById('statusBox');
        if (!msg) {
          box.style.display = 'none';
          return;
        }
        box.style.display = 'block';
        box.innerText = msg;
        box.style.color = isError ? '#D32F2F' : '#333';
        box.style.backgroundColor = isError ? '#FFEBEE' : '#f1f3f4';
      }
    </script>
  </body>
</html>
